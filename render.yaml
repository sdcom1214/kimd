services:
  - type: web
    name: city-evolution-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: city-evolution-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: city-evolution-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
