<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도시 진화 시뮬레이터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nanum+Gothic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <section id="start-screen" class="screen active">
        <div class="hero-card">
          <p class="eyebrow">SDG 11 • 지속가능한 도시와 공동체</p>
          <h1>도시 진화 시뮬레이터</h1>
          <p class="hero-copy">
            6번의 도시 정책 선택을 하고, 선택할 때마다 도시가 바로 변하는 모습을 확인하세요.
            더 푸르고, 더 행복하고, 더 편리한 도시를 만들어 보세요.
          </p>
          <div class="hero-pills">
            <span>빠른 체험형 게임</span>
            <span>6번의 선택</span>
            <span>즉시 도시 변화</span>
          </div>
          <button id="start-button" class="primary-button start-button">게임 시작</button>
        </div>
        <div class="hero-preview">
          <div class="mini-city-card">
            <div class="mini-sky"></div>
            <div class="mini-buildings"></div>
            <div class="mini-park"></div>
          </div>
        </div>
      </section>

      <section id="game-screen" class="screen">
        <header class="game-topbar">
          <div>
            <p class="eyebrow">진행 상황</p>
            <h2 id="round-label">1 / 6 라운드</h2>
          </div>
          <div class="progress-wrap">
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>
        </header>

        <div class="game-layout">
          <div class="visual-panel">
            <div id="city-stage" class="city-stage">
              <div id="sky-layer" class="layer sky-layer"></div>
              <div id="smog-layer" class="layer smog-layer"></div>
              <div id="sun-layer" class="layer sun-layer"></div>
              <div id="back-buildings" class="layer building-layer back-buildings"></div>
              <div id="front-buildings" class="layer building-layer front-buildings"></div>
              <div id="park-layer" class="layer park-layer"></div>
              <div id="transport-layer" class="layer transport-layer"></div>
              <div id="road-layer" class="layer road-layer"></div>
              <div id="happiness-layer" class="layer happiness-layer"></div>
              <div class="ground-strip"></div>
            </div>

            <div class="stats-card">
              <div class="stat-block">
                <span>Environment</span>
                <strong id="environment-value">50</strong>
                <div class="stat-bar"><div id="environment-bar" class="stat-fill environment"></div></div>
              </div>
              <div class="stat-block">
                <span>Transport</span>
                <strong id="transport-value">50</strong>
                <div class="stat-bar"><div id="transport-bar" class="stat-fill transport"></div></div>
              </div>
              <div class="stat-block">
                <span>Happiness</span>
                <strong id="happiness-value">50</strong>
                <div class="stat-bar"><div id="happiness-bar" class="stat-fill happiness"></div></div>
              </div>
              <div class="stat-block">
                <span>Development</span>
                <strong id="development-value">50</strong>
                <div class="stat-bar"><div id="development-bar" class="stat-fill development"></div></div>
              </div>
            </div>
          </div>

          <aside class="question-panel">
            <p class="eyebrow">이번 선택</p>
            <h3 id="question-title"></h3>
            <div id="choices-container" class="choices-container"></div>
          </aside>
        </div>
      </section>

      <section id="result-screen" class="screen">
        <div class="result-layout">
          <div class="result-visual-panel">
            <div id="result-city-stage" class="city-stage result-stage">
              <div id="result-sky-layer" class="layer sky-layer"></div>
              <div id="result-smog-layer" class="layer smog-layer"></div>
              <div id="result-sun-layer" class="layer sun-layer"></div>
              <div id="result-back-buildings" class="layer building-layer back-buildings"></div>
              <div id="result-front-buildings" class="layer building-layer front-buildings"></div>
              <div id="result-park-layer" class="layer park-layer"></div>
              <div id="result-transport-layer" class="layer transport-layer"></div>
              <div id="result-road-layer" class="layer road-layer"></div>
              <div id="result-happiness-layer" class="layer happiness-layer"></div>
              <div class="ground-strip"></div>
            </div>
          </div>

          <div class="result-card">
            <p class="eyebrow">최종 결과</p>
            <h2 id="result-city-type">균형 잡힌 스마트 도시</h2>
            <p id="result-feedback" class="result-feedback"></p>
            <div id="result-score" class="result-score"></div>
            <div id="result-stats" class="result-stats"></div>

            <label class="nickname-label" for="nickname-input">닉네임</label>
            <input id="nickname-input" class="nickname-input" maxlength="20" placeholder="닉네임을 입력하세요" />

            <div class="result-actions">
              <button id="save-result-button" class="primary-button">결과 저장</button>
              <button id="view-leaderboard-button" class="secondary-button">리더보드 보기</button>
              <button id="replay-button" class="ghost-button">다시 하기</button>
            </div>
            <p id="save-status" class="save-status"></p>
          </div>
        </div>
      </section>

      <section id="leaderboard-screen" class="screen">
        <div class="leaderboard-card">
          <div class="leaderboard-header">
            <div>
              <p class="eyebrow">최고의 도시 설계자</p>
              <h2>리더보드</h2>
            </div>
            <div class="leaderboard-actions">
              <button id="leaderboard-replay-button" class="secondary-button">다시 플레이</button>
              <button id="back-to-start-button" class="ghost-button">처음으로</button>
            </div>
          </div>
          <div id="leaderboard-content" class="leaderboard-content"></div>
        </div>
      </section>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
