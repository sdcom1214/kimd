<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리더보드 리셋</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", sans-serif;
        background: linear-gradient(180deg, #f3f4f6, #e5e7eb);
        color: #111827;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(560px, 100%);
        background: #fff;
        border: 1px solid #d1d5db;
        padding: 32px;
      }
      h1 { margin: 0 0 10px; font-size: 1.9rem; }
      p { margin: 0 0 20px; line-height: 1.5; }
      label { display: block; margin-bottom: 8px; font-weight: 700; }
      input {
        width: 100%;
        height: 46px;
        padding: 0 12px;
        border: 1px solid #9ca3af;
        margin-bottom: 14px;
      }
      button {
        width: 100%;
        height: 48px;
        border: 0;
        background: #111827;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      #status { margin-top: 14px; min-height: 22px; font-weight: 600; }
      .link { margin-top: 14px; }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>리더보드 전체 리셋</h1>
      <p>비밀번호를 입력하면 모든 난이도 리더보드가 즉시 초기화됩니다.</p>
      <label for="password">비밀번호</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="reset-button" type="button">전체 리셋 실행</button>
      <div id="status"></div>
      <div class="link"><a href="/">게임으로 돌아가기</a></div>
    </main>

    <script>
      const passwordInput = document.getElementById("password");
      const resetButton = document.getElementById("reset-button");
      const statusEl = document.getElementById("status");

      resetButton.addEventListener("click", resetLeaderboard);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") resetLeaderboard();
      });

      async function resetLeaderboard() {
        const password = passwordInput.value.trim();
        if (!password) {
          statusEl.textContent = "비밀번호를 입력하세요.";
          return;
        }

        resetButton.disabled = true;
        statusEl.textContent = "리셋 중...";

        try {
          const result = await requestReset(password);
          statusEl.textContent = `완료: ${result.deletedCount}개 기록이 삭제되었습니다.`;
          passwordInput.value = "";
        } catch (error) {
          statusEl.textContent = `실패: ${error.message}`;
        } finally {
          resetButton.disabled = false;
        }
      }

      async function requestReset(password) {
        const candidates = buildApiCandidates();
        let lastMessage = "API 호출에 실패했습니다.";

        for (const base of candidates) {
          const url = `${base}/api/reset`;
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password }),
            });

            const payload = await parseJsonSafe(response);
            if (response.ok && payload && payload.ok) return payload;

            if (payload && payload.error) {
              lastMessage = payload.error;
            } else {
              lastMessage = `HTTP ${response.status}`;
            }
          } catch (error) {
            lastMessage = error.message || "네트워크 오류";
          }
        }

        throw new Error(lastMessage);
      }

      function buildApiCandidates() {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        if (isLocal) return ["http://localhost:3100", "/_/backend"];
        return ["/_/backend"];
      }

      async function parseJsonSafe(response) {
        try {
          return await response.json();
        } catch (_error) {
          return null;
        }
      }
    </script>
  </body>
</html>
